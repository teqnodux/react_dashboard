<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberArk Software Ltd - MAE Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #0f1419;
            --bg-tertiary: #151c24;
            --bg-hover: #1a232e;
            --text-primary: #e6e6e6;
            --text-secondary: #8a919a;
            --text-muted: #5c6370;
            --accent-blue: #5ccfe6;
            --accent-green: #87d96c;
            --accent-yellow: #ffcc66;
            --accent-red: #f07178;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'IBM Plex Sans', sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
        .container { max-width: 1600px; margin: 0 auto; padding: 16px; }
        
        /* Alert Bar */
        .alert-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: var(--font-mono);
        }
        
        .deal-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .alert-flag {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .alert-flag.outliers {
            background: rgba(240, 113, 120, 0.2);
            color: var(--accent-red);
        }
        
        .alert-flag.atypical {
            background: rgba(255, 204, 102, 0.15);
            color: var(--accent-yellow);
        }
        
        .alert-flag.compliance {
            background: rgba(255, 204, 102, 0.15);
            color: var(--accent-yellow);
        }
        
        /* Flagged Section */
        .flagged-section {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 4px;
            margin-bottom: 16px;
        }
        
        .section-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--bg-tertiary);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .flagged-clause {
            padding: 16px;
            border-bottom: 1px solid var(--bg-tertiary);
        }
        
        .flagged-clause:last-child {
            border-bottom: none;
        }
        
        .clause-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .clause-id {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .clause-zone {
            font-size: 1.2rem;
        }
        
        .clause-category {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 3px 8px;
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
        
        .clause-text {
            font-family: var(--font-sans);
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 12px;
            font-style: italic;
            padding-left: 12px;
            border-left: 2px solid var(--bg-tertiary);
        }
        
        .risk-item {
            margin-bottom: 8px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
        }
        
        .risk-label {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.7rem;
            margin-right: 8px;
        }
        
        .risk-value {
            color: var(--text-primary);
        }
        
        .red-flags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }
        
        .red-flag {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            padding: 3px 8px;
            background: rgba(240, 113, 120, 0.15);
            color: var(--accent-red);
            border-radius: 3px;
        }
        
        /* Full Table Section */
        .table-section {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 4px;
        }
        
        .filters {
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--bg-tertiary);
            flex-wrap: wrap;
        }
        
        .filter-btn {
            font-family: var(--font-mono);
            padding: 6px 12px;
            border: 1px solid var(--bg-tertiary);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-blue);
        }
        
        .filter-btn.active {
            background: var(--accent-blue);
            color: var(--bg-primary);
            border-color: var(--accent-blue);
        }
        
        .export-btn {
            font-family: var(--font-mono);
            padding: 6px 12px;
            background: var(--accent-green);
            color: var(--bg-primary);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
            margin-left: auto;
        }
        
        .export-btn:hover {
            background: var(--accent-blue);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: var(--bg-tertiary);
        }
        
        th {
            font-family: var(--font-mono);
            text-align: left;
            padding: 10px 12px;
            font-weight: 500;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        td {
            font-family: var(--font-mono);
            padding: 10px 12px;
            border-bottom: 1px solid var(--bg-tertiary);
            font-size: 0.75rem;
        }
        
        tbody tr:hover {
            background: var(--bg-hover);
        }
        
        /* Flagged row styling */
        .row-flagged {
            background: rgba(240, 113, 120, 0.05);
            border-left: 3px solid var(--accent-red);
        }
        
        .row-flagged:hover {
            background: rgba(240, 113, 120, 0.08);
        }
        
        .row-atypical {
            background: rgba(255, 204, 102, 0.05);
            border-left: 3px solid var(--accent-yellow);
        }
        
        .row-atypical:hover {
            background: rgba(255, 204, 102, 0.08);
        }
        
        .row-typical {
            opacity: 0.7;
        }

        .row-typical:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.02);
        }

        tr[style*="cursor"] td {
            user-select: none;
        }
        
        .zone-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        
        .zone-typical {
            background: rgba(135, 217, 108, 0.15);
            color: var(--accent-green);
        }
        
        .zone-atypical {
            background: rgba(255, 204, 102, 0.15);
            color: var(--accent-yellow);
        }
        
        .zone-outlier {
            background: rgba(240, 113, 120, 0.15);
            color: var(--accent-red);
        }
        
        .expand-btn {
            font-family: var(--font-mono);
            padding: 4px 10px;
            background: var(--bg-tertiary);
            color: var(--accent-blue);
            border: 1px solid var(--bg-tertiary);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }
        
        .expand-btn:hover {
            background: var(--accent-blue);
            color: var(--bg-primary);
        }
        
        .clause-detail {
            display: none;
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 3px;
            border-left: 3px solid var(--accent-blue);
        }
        
        .clause-detail.show {
            display: block;
        }
        
        .detail-section {
            margin-bottom: 12px;
        }
        
        .detail-section:last-child {
            margin-bottom: 0;
        }
        
        .detail-section h4 {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        .detail-section p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            line-height: 1.6;
        }
        
        .full-text {
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 3px;
            font-style: italic;
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Alert Bar -->
        
        <div class="alert-bar">
            <span class="deal-name">DEAL</span>
            <span class="alert-flag compliance">💰 FINANCING (1)</span>
        </div>
        
        
        <!-- Integrated Clause Table -->
        <div class="table-section">
            <div class="section-header">CLAUSE ANALYSIS (9)</div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterClauses('all')">All (9)</button>
                <button class="filter-btn" onclick="filterClauses('typical')">🟢 Typical</button>
                <button class="filter-btn" onclick="filterClauses('atypical')">🟡 Atypical</button>
                <button class="filter-btn" onclick="filterClauses('outlier')">🔴 Outliers</button>
                <button class="export-btn" onclick="exportData()">📥 Export</button>
            </div>
            <table id="clauseTable">
                <thead>
                    <tr>
                        <th>Clause</th>
                        <th>Zone</th>
                        <th>Category</th>
                        <th>Cluster Match</th>
                        <th>Ratio</th>
                        <th>Compliance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="clauseTableBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        const clauseData = [
  {
    "id": "(i)",
    "text": "any change in general United States or global economic conditions, including changes in the credit, debt, financial or capital markets (including changes in interest or exchange rates), in each case in the United States or anywhere else in the world",
    "zone": "typical",
    "category": "economic",
    "cluster_name": "Broad Economic and Financial Market Changes Exclusion",
    "ratio": 0.3831056444128511,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(ii)",
    "text": "any change that generally affects any of the industries or markets in which the Company and its Subsidiaries, or Parent and its Subsidiaries, as applicable, operate",
    "zone": "typical",
    "category": "economic",
    "cluster_name": "Broad Economic and Financial Market Changes Exclusion",
    "ratio": 0.868810775624913,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(iii)",
    "text": "any change in political conditions (or the escalation of any such change in political conditions existing as of the date of this Agreement) or any hostilities, war, police action, acts of terrorism or natural disasters (or the escalation of any such hostilities, war, police action, acts of terrorism or natural disasters existing as of the date of this Agreement) in the United States or anywhere else in the world",
    "zone": "typical",
    "category": "force_majeure",
    "cluster_name": "Catastrophic External Events Beyond Party Control",
    "ratio": 0.745215034776537,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(iv)",
    "text": "any change in applicable Law or GAAP or other applicable accounting standards (or the interpretation thereof)",
    "zone": "typical",
    "category": "accounting",
    "cluster_name": "Changes in Law, GAAP, and Regulatory Accounting Standards",
    "ratio": 0.30196843591911254,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(v)",
    "text": "any change arising from or relating to the announcement or pendency of the transactions contemplated by this Agreement, including the impact thereof on relationships, contractual or otherwise, with customers, suppliers, licensors, distributors, partners, providers and employees",
    "zone": "typical",
    "category": "transaction",
    "cluster_name": "Exclusion for impacts from deal announcement and execution",
    "ratio": 0.7714705759735816,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(vi)",
    "text": "any failure by the Company or Parent, as applicable, to meet any projections, forecasts, guidance, estimates, milestones, budgets or financial or operating predictions of revenue, earnings, cash flow or cash position",
    "zone": "typical",
    "category": "disclosure",
    "cluster_name": "Failure to Meet Financial Projections and Forecasts Exclusions",
    "ratio": 0.8607718859845793,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(vii)",
    "text": "any Effect arising from or relating to the taking of any action contemplated or permitted by this Agreement or taken at the written request of Parent or the Company, as applicable",
    "zone": "typical",
    "category": "transaction",
    "cluster_name": "Actions Taken Pursuant to or Required by Agreement Terms",
    "ratio": 0.623125452036091,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(viii)",
    "text": "any hurricane, tornado, flood, earthquake, tsunami, other natural disaster, pandemic (including COVID-19 or any COVID-19 Measures), epidemic, disease outbreak or other force majeure event in the United States or anywhere else in the world",
    "zone": "typical",
    "category": "force_majeure",
    "cluster_name": "Catastrophic External Events Beyond Party Control",
    "ratio": 0.5670537898928436,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  },
  {
    "id": "(ix)",
    "text": "any change in the Company's stock price or the trading volume of the Company's stock, or Parent's share price or the trading volume of Parent Shares, as applicable, or any change in the credit rating of the Company or Parent, as applicable",
    "zone": "typical",
    "category": "transaction",
    "cluster_name": "Market Price and Trading Volume Exclusions with Underlying Cause Carvebacks",
    "ratio": 0.6655721968747289,
    "compliance": {
      "cybersecurity": "No",
      "tariffs": "No",
      "countries": [],
      "disclosure": "No"
    }
  }
];
        
        function populateTable(filter = 'all') {
            const tbody = document.getElementById('clauseTableBody');
            tbody.innerHTML = '';
            const filtered = filter === 'all' ? clauseData : clauseData.filter(c => c.zone === filter);
            
            filtered.forEach((clause, index) => {
                const isFlagged = clause.zone === 'outlier' || clause.zone === 'atypical';
                const row = document.createElement('tr');
                
                // Add visual class for flagged rows
                if (clause.zone === 'outlier') {
                    row.className = 'row-flagged';
                } else if (clause.zone === 'atypical') {
                    row.className = 'row-atypical';
                } else {
                    row.className = 'row-typical';
                }
                
                let compFlags = [];
                if (clause.compliance) {
                    if (clause.compliance.cybersecurity === 'Yes') compFlags.push('🔐');
                    if (clause.compliance.tariffs === 'Yes') compFlags.push('📦');
                    if (clause.compliance.countries && clause.compliance.countries.length > 0) compFlags.push('🌍');
                    if (clause.compliance.disclosure === 'Yes') compFlags.push('📄');
                }
                
                row.style.cursor = 'pointer';
                row.onclick = () => toggleDetail(index);
                row.innerHTML = `
                    <td><strong>${clause.id}</strong></td>
                    <td><span class="zone-badge zone-${clause.zone}">${clause.zone.toUpperCase()}</span></td>
                    <td>${clause.category.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</td>
                    <td>${clause.cluster_name}</td>
                    <td>${clause.ratio.toFixed(2)}</td>
                    <td>${compFlags.join(' ') || '-'}</td>
                    <td><span class="expand-btn">${'▶'}</span></td>
                `;
                tbody.appendChild(row);
                
                // Detail row with full analysis
                const detailRow = document.createElement('tr');
                detailRow.className = clause.zone === 'outlier' ? 'row-flagged' : clause.zone === 'atypical' ? 'row-atypical' : 'row-typical';
                detailRow.innerHTML = `
                    <td colspan="7">
                        <div class="clause-detail${''}" id="detail-${index}">
                            <div class="detail-section">
                                <h4>Full Text</h4>
                                <p class="full-text">${clause.text}</p>
                            </div>
                            ${clause.risk_analysis ? `
                                <div class="detail-section">
                                    <h4>⚠️ Why Flagged</h4>
                                    <p>${clause.risk_analysis.explanation || 'Unusual provision detected'}</p>
                                </div>
                                <div class="detail-section">
                                    <h4>Risk Assessment</h4>
                                    <p><strong>Level:</strong> ${clause.risk_analysis.risk_level?.toUpperCase() || 'N/A'}</p>
                                    <p><strong>Priority:</strong> ${clause.risk_analysis.investigation_priority?.toUpperCase() || 'N/A'}</p>
                                    ${clause.risk_analysis.red_flags?.length ? `
                                        <h4 style="margin-top: 12px;">Red Flags</h4>
                                        <div class="red-flags">${clause.risk_analysis.red_flags.map(f => `<span class="red-flag">✗ ${f}</span>`).join('')}</div>
                                    ` : ''}
                                </div>
                            ` : (isFlagged ? `
                                <div class="detail-section">
                                    <h4>⚠️ Why Flagged</h4>
                                    <p>Distance ratio ${clause.ratio.toFixed(2)} - differs significantly from typical cluster: ${clause.cluster_name}</p>
                                </div>
                            ` : '')}
                            ${clause.compliance ? `
                                <div class="detail-section">
                                    <h4>Compliance Checks</h4>
                                    <p>🔐 Cybersecurity: ${clause.compliance.cybersecurity || 'No'}</p>
                                    <p>📦 Tariffs/Trade: ${clause.compliance.tariffs || 'No'}</p>
                                    <p>🌍 Countries: ${clause.compliance.countries && clause.compliance.countries.length > 0 ? clause.compliance.countries.join(', ') : 'None'}</p>
                                    <p>📄 Disclosure Schedules: ${clause.compliance.disclosure || 'No'}</p>
                                </div>
                            ` : ''}
                        </div>
                    </td>
                `;
                tbody.appendChild(detailRow);
            });
        }
        
        function toggleDetail(index) {
            document.getElementById(`detail-${index}`).classList.toggle('show');
        }
        
        function filterClauses(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            populateTable(filter);
        }
        
        function exportData() {
            const dataStr = JSON.stringify({clauses: clauseData}, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'CyberArk Software Ltd_analysis.json';
            a.click();
        }
        
        populateTable();
    </script>
</body>
</html>
